# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: screen_space_post_processing
    status: active
    api: SCREEN_TEXTURE canvas_item shader
    not: SubViewport, BackBufferCopy, per-sprite materials
    adr: docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    reason: "Single post-process pass handles entire visual identity without per-asset setup. Prototype validated performance."
    referenced_by:
      - docs/architecture/adr-0002-knowledge-color-accumulation.md
    added: 2026-05-14

  - purpose: color_accumulation_source
    status: active
    api: Derived view from InsightGenerator + ClueDatabase
    not: Independent accumulator, per-discovery events, fixed gates
    adr: docs/architecture/adr-0002-knowledge-color-accumulation.md
    reason: "Single source of truth prevents sync bugs. Cross-loop persistence automatic."
    referenced_by:
      - docs/architecture/adr-0005-clue-insight-unified-schema.md
    added: 2026-05-14

  - purpose: ui_rendering_layer
    status: active
    api: CanvasLayer 30+ (HUD), 40 (Dialogue), 50 (Notebook)
    not: Rendering below CanvasLayer 10 (would be ink-washed)
    adr: docs/architecture/adr-0003-ui-visual-register-system.md
    reason: "UI elements must render above ink wash (layer 10) and rain (layer 20) to remain readable."
    referenced_by:
      - docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    added: 2026-05-14

  - purpose: interaction_detection
    status: active
    api: Area2D.input_event signal + InteractionBus autoload
    not: Physics raycast, InputMap actions, direct signal per interactable
    adr: docs/architecture/adr-0006-interaction-event-bus.md
    reason: "Area2D.input_event is the idiomatic Godot pattern for 2D click detection. Central bus provides unified logging and filtering."
    referenced_by:
      - docs/architecture/adr-0005-clue-insight-unified-schema.md
    added: 2026-05-14

  - purpose: knowledge_data_storage
    status: active
    api: In-memory Dictionary + JSON serialization
    not: Godot Resource (.tres), separate tables, graph database
    adr: docs/architecture/adr-0005-clue-insight-unified-schema.md
    reason: "Mix of pre-authored and player-discovered data. Unified in-memory Dictionary simpler than Resource files for runtime data."
    referenced_by:
      - docs/architecture/adr-0002-knowledge-color-accumulation.md
    added: 2026-05-14

  - purpose: transition_fade_overlay
    status: active
    api: CanvasLayer 100 + ColorRect
    not: SceneTree.change_scene, instant transition
    adr: docs/architecture/adr-0007-room-location-management.md
    reason: "Fade overlay must cover all game content and UI (layers 0-60). Layer 100 is above all established layers."
    referenced_by:
      - docs/architecture/adr-0003-ui-visual-register-system.md
    added: 2026-05-14

  - purpose: room_scene_loading
    status: active
    api: PackedScene.instantiate() + add_child/remove_child
    not: SceneTree.change_scene_to_file(), all rooms preloaded, TileMap camera scrolling
    adr: docs/architecture/adr-0007-room-location-management.md
    reason: "Manual lifecycle control enables custom fade transitions and interactable registration. On-demand loading keeps memory low for mobile portability."
    referenced_by:
      - docs/architecture/adr-0004-loop-state-management.md
      - docs/architecture/adr-0006-interaction-event-bus.md
    added: 2026-05-14

  - purpose: pressure_curve_calculation
    status: active
    api: Godot Curve Resource + Curve.sample()
    not: Linear interpolation, Tween animation, AnimationPlayer
    adr: docs/architecture/adr-0008-countdown-timer.md
    reason: "Curve Resource provides designer-editable pressure curves in the editor inspector. Default linear; no code change needed for non-linear shapes."
    referenced_by:
      - docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    added: 2026-05-14

  - purpose: save_file_format
    status: active
    api: JSON with schema versioning
    not: Godot Resource .tres, binary format, per-system files
    adr: docs/architecture/adr-0010-save-load-persistence.md
    reason: "Human-readable for debugging. Schema migration via Dictionary transformation. Consistent with ADR-0005's JSON serialization decision."
    referenced_by:
      - docs/architecture/adr-0004-loop-state-management.md
      - docs/architecture/adr-0005-clue-insight-unified-schema.md
    added: 2026-05-14

  - purpose: crash_safe_write
    status: active
    api: Atomic write (write-to-tmp + OS.rename) with backup rotation
    not: Direct overwrite, write-ahead log
    adr: docs/architecture/adr-0010-save-load-persistence.md
    reason: "Atomic rename provides crash safety without WAL complexity. Backup rotation (.bak) provides fallback for corrupt primary. Auto-save debounce limits write frequency."
    referenced_by:
      - docs/architecture/adr-0004-loop-state-management.md
    added: 2026-05-14
