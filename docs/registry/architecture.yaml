# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: hover_only_interaction
    status: active
    description: "No interaction may require hover as the only discovery mechanism.
      All interactables must be discoverable via click/tap or passive visual cue."
    why: "Mobile portability — touch has no hover. Art bible Section 7 requires passive discoverability."
    adr: docs/architecture/adr-0003-ui-visual-register-system.md
    added: 2026-05-14

  - pattern: ui_below_canvas_layer_10
    status: active
    description: "No UI elements may render below CanvasLayer 10 (ink wash post-process).
      All UI must be on CanvasLayer 30 or above."
    why: "UI below CanvasLayer 10 would be ink-washed, making it unreadable."
    adr: docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    added: 2026-05-14

  - pattern: independent_color_accumulator
    status: active
    description: "Color accumulation must be derived from InsightGenerator and ClueDatabase,
      not an independent counter."
    why: "Independent accumulator creates data duplication and sync bugs. Single source of truth."
    adr: docs/architecture/adr-0002-knowledge-color-accumulation.md
    added: 2026-05-14

  - pattern: interaction_bus_game_logic
    status: active
    description: "InteractionBus must contain only detection and dispatch logic.
      No game logic (consequence, state change, reward) in the bus."
    why: "Event bus must stay narrow. Game logic belongs in consumer systems."
    adr: docs/architecture/adr-0006-interaction-event-bus.md
    added: 2026-05-14

  - pattern: non_atomic_night_advance
    status: active
    description: "Night advancement must use the atomic advance_night() operation.
      Systems must not increment current_night directly."
    why: "Partial state corruption during transition. Atomic operation guarantees consistent state."
    adr: docs/architecture/adr-0004-loop-state-management.md
    added: 2026-05-14

