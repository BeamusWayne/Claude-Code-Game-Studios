# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - target_fps: 60
    total_frame_budget_ms: 16.6
    platform: All
    adr: docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    added: 2026-05-14

  - system: ink_wash_shader
    status: active
    budget_ms: 1.5
    adr: docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    notes: "FBM paper grain + color accumulation. Screen-space post-process on CanvasLayer 10."
    referenced_by:
      - docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    added: 2026-05-14

  - system: rain_overlay
    status: active
    budget_ms: 1.5
    adr: docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    notes: "3-layer procedural streaks + bottom mist. Screen-space on CanvasLayer 20."
    referenced_by:
      - docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    added: 2026-05-14

  - system: hud_draw_calls
    status: active
    budget_ms: 5-8
    adr: docs/architecture/adr-0003-ui-visual-register-system.md
    notes: "HUD 5-8 draw calls; Dialogue 3-5; Notebook 8-12 (one page visible). Total UI ≤8 target."
    referenced_by:
      - docs/architecture/adr-0003-ui-visual-register-system.md
    added: 2026-05-14

  - system: timer_service
    status: active
    budget_ms: 0.01
    adr: docs/architecture/adr-0008-countdown-timer.md
    notes: "One Curve.sample() + float arithmetic per frame during active countdown. Inactive via set_process(false) — zero cost."
    referenced_by:
      - docs/architecture/adr-0001-ink-wash-shader-pipeline.md
    added: 2026-05-14

